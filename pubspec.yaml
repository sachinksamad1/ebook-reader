name: ebook_reader
description: "A minimal, distraction-free ebook reader for language learners."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Firebase
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_auth: ^5.5.1

  # Reader
  epubx: ^4.0.0
  webview_flutter: ^4.10.0
  syncfusion_flutter_pdfviewer: ^29.1.38

  # Utilities
  path_provider: ^2.1.5
  flutter_cache_manager: ^3.4.1
  file_picker: ^8.1.7
  http: ^1.3.0
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.11.0

flutter_icons:
  android: "launcher_icon"
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

